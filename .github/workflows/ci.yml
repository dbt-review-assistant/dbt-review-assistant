name: CI & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Run pre-commit
        run: uv tool run pre-commit run --all-files --show-diff-on-failure

  test:
    needs: pre-commit
    name: Test (${{ matrix.env }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        env: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.env }}
        run: uv python install ${{ matrix.env }}

      - name: Install tox
        run: uv tool install tox --with tox-uv --with tox-gh

      - name: Run Tests
        run: tox run
        env:
          TOX_GH_MAJOR_MINOR: ${{ matrix.env }}

  release:
    name: Release & Publish
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: release
    environment:
      name: pypi
      url: https://pypi.org/p/dbt-review-assistant
    permissions:
      contents: write # Required for PSR to push tags and update pyproject.toml
      id-token: write # Required for OIDC trusted publishing to PyPI

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for semantic-release to see history

      - name: Python Semantic Release
        id: psr
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        if: steps.psr.outputs.released == 'true'
        uses: astral-sh/setup-uv@v5

      - name: Build
        if: steps.psr.outputs.released == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.psr.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
