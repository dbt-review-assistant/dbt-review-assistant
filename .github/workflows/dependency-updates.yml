name: Scheduled Dependency Update

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight
  workflow_dispatch: # Allow manual triggering

jobs:
  upgrade-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Upgrade dependencies
        run: uv lock --upgrade

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "chore: upgrade dependencies in uv.lock"
          title: "chore: weekly dependency upgrade"
          body: "This is an automated PR to upgrade project dependencies using `uv lock --upgrade`."
          branch: "automation/dependency-upgrade"
          delete-branch: true
